<!DOCTYPE html>
<html lang="he">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Shalem</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f7f3ee;
}

h1{
text-align:center;
margin:25px 0;
font-weight:300;
letter-spacing:2px;
}

/* גלריה */

#gallery{
width:100%;
}

.product{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px 0;
cursor:pointer;
}

.product img{
max-width:90%;
max-height:70vh;
object-fit:contain;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.name{
margin-top:15px;
font-size:22px;
}

.price{
margin-top:6px;
font-size:18px;
color:#444;
}

.status{
margin-top:5px;
font-size:14px;
}

.instock{
color:green;
}

.outstock{
color:red;
}

/* מובייל */

@media(max-width:700px){

#gallery{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:85vh;
}

.product{
flex:0 0 100%;
scroll-snap-align:center;
padding:0;
}

.product img{
max-height:60vh;
}

}

/* חלון מוצר */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
text-align:center;
padding-top:60px;
}

.modal img{
max-width:90%;
border-radius:10px;
}

#close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
}

/* כפתור מנהל */

#adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
border:none;
padding:14px;
border-radius:50%;
font-size:16px;
cursor:pointer;
}

/* כפתור הוספה */

#addBtn{
position:fixed;
bottom:80px;
right:20px;
background:green;
color:white;
border:none;
padding:14px;
border-radius:50%;
font-size:18px;
cursor:pointer;
display:none;
}

/* טופס הוספה */

#addForm{
display:none;
text-align:center;
padding:20px;
}

input,textarea{
width:80%;
padding:10px;
margin:6px;
}

button{
cursor:pointer;
}

</style>

</head>


<body>

<h1>Studio Shalem</h1>

<div id="gallery"></div>

<button id="adminBtn" onclick="adminLogin()">Admin</button>
<button id="addBtn" onclick="showAddForm()">+</button>


<!-- חלון מוצר -->

<div id="modal" class="modal">

<span id="close">✕</span>

<img id="modal-img">

<h2 id="modal-name"></h2>

<p id="modal-desc"></p>

<h3 id="modal-price"></h3>

<div id="adminArea"></div>

</div>


<!-- טופס הוספת מוצר -->

<div id="addForm">

<h3>הוספת מוצר</h3>

<input id="newName" placeholder="שם מוצר"><br>

<input id="newPrice" type="number" placeholder="מחיר"><br>

<textarea id="newDesc" placeholder="תיאור"></textarea><br>

<input type="file" id="newImage" accept="image/*"><br>

<button onclick="saveNewProduct()">שמור מוצר</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCqi32tyPHflqnqvTZfBPf_SPqQdvKrq_A",
authDomain:"studioshalem-ba925.firebaseapp.com",
projectId:"studioshalem-ba925",
storageBucket:"studioshalem-ba925.firebasestorage.app",
messagingSenderId:"488962069403",
appId:"1:488962069403:web:83e7eb50756cf40436873e"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let adminMode=false;
let products=[];

let modal=document.getElementById("modal")
let modalImg=document.getElementById("modal-img")
let modalName=document.getElementById("modal-name")
let modalDesc=document.getElementById("modal-desc")
let modalPrice=document.getElementById("modal-price")
let adminArea=document.getElementById("adminArea")

document.getElementById("close").onclick=()=>modal.style.display="none"

/* טעינת מוצרים */

async function loadProducts(){

const snapshot=await getDocs(collection(db,"products"))

products=[]

let html=""

snapshot.forEach(docSnap=>{

let p=docSnap.data()
p.id=docSnap.id

products.push(p)

let status=p.stock?"במלאי":"לא במלאי"
let className=p.stock?"instock":"outstock"

html+=`

<div class="product" onclick="openProduct('${p.id}')">

<img src="${p.image}">

<div class="name">${p.name}</div>

<div class="price">₪${p.price}</div>

<div class="status ${className}">${status}</div>

</div>

`

})

document.getElementById("gallery").innerHTML=html

}

loadProducts()

/* כניסת מנהל */

window.adminLogin=function(){

let pass=prompt("סיסמת מנהל")

if(pass==="1234"){

adminMode=true

alert("מצב מנהל הופעל")

document.getElementById("addBtn").style.display="block"

}

}

/* פתיחת מוצר */

window.openProduct=function(id){

let p=products.find(x=>x.id===id)

modal.style.display="block"

modalImg.src=p.image

if(adminMode){

modalName.innerHTML=`<input id="editName" value="${p.name}">`

modalDesc.innerHTML=`<textarea id="editDesc">${p.description}</textarea>`

modalPrice.innerHTML=`<input id="editPrice" type="number" value="${p.price}">`

adminArea.innerHTML=`

<button onclick="saveChanges('${id}')">שמור</button>

<button onclick="toggleStock('${id}')">שנה מלאי</button>

`

}

else{

modalName.innerText=p.name
modalDesc.innerText=p.description
modalPrice.innerText="₪"+p.price
adminArea.innerHTML=""

}

}

/* שמירת עריכה */

window.saveChanges=async function(id){

let newName=document.getElementById("editName").value
let newDesc=document.getElementById("editDesc").value
let newPrice=document.getElementById("editPrice").value

await updateDoc(doc(db,"products",id),{

name:newName,
description:newDesc,
price:Number(newPrice)

})

alert("נשמר")

loadProducts()

}

/* שינוי מלאי */

window.toggleStock=async function(id){

let product=products.find(p=>p.id===id)

await updateDoc(doc(db,"products",id),{

stock:!product.stock

})

loadProducts()

}

/* פתיחת טופס הוספה */

window.showAddForm=function(){

document.getElementById("addForm").style.display="block"

}

/* שמירת מוצר חדש */

window.saveNewProduct=function(){

let name=document.getElementById("newName").value
let price=document.getElementById("newPrice").value
let desc=document.getElementById("newDesc").value

let file=document.getElementById("newImage").files[0]

let reader=new FileReader()

reader.onload=function(){

let imageData=reader.result

addDoc(collection(db,"products"),{

name:name,
description:desc,
price:Number(price),
image:imageData,
stock:true

}).then(()=>{

alert("המוצר נוסף")

loadProducts()

document.getElementById("addForm").style.display="none"

})

}

reader.readAsDataURL(file)

}

</script>

</body>

</html>
