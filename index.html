<!DOCTYPE html>
<html lang="he">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Shalem</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>Studio Shalem</h1>

<div id="gallery"></div>

<button id="adminBtn" onclick="adminLogin()">A</button>
<button id="addBtn" onclick="showAddForm()">+</button>


<!-- חלון עריכה -->

<div id="modal" class="modal">

<div class="modal-card">

<span id="close">✕</span>

<img id="modal-img">

<h2 id="modal-name"></h2>

<p id="modal-desc"></p>

<h3 id="modal-price"></h3>

<div id="modal-stock"></div>

<div id="adminArea"></div>

</div>

</div>


<!-- טופס הוספת מוצר -->

<div id="addForm">

<h3>הוספת מוצר</h3>

<input id="newName" placeholder="שם מוצר">

<input id="newPrice" type="number" placeholder="מחיר">

<textarea id="newDesc" placeholder="תיאור"></textarea>

<input type="file" id="newImage" accept="image/*">

<button onclick="saveNewProduct()">שמור מוצר</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
addDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyCqi32tyPHflqnqvTZfBPf_SPqQdvKrq_A",
authDomain:"studioshalem-ba925.firebaseapp.com",
projectId:"studioshalem-ba925",
storageBucket:"studioshalem-ba925.firebasestorage.app",
messagingSenderId:"488962069403",
appId:"1:488962069403:web:83e7eb50756cf40436873e"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let adminMode=false;
let products=[];

let modal=document.getElementById("modal")
let modalImg=document.getElementById("modal-img")
let modalName=document.getElementById("modal-name")
let modalDesc=document.getElementById("modal-desc")
let modalPrice=document.getElementById("modal-price")
let modalStock=document.getElementById("modal-stock")
let adminArea=document.getElementById("adminArea")

document.getElementById("close").onclick=closeModal


function closeModal(){

modal.style.display="none"
document.body.classList.remove("modal-open")

}


document.addEventListener("keydown",function(e){

if(e.key==="Escape") closeModal()

})


async function loadProducts(){

const snapshot=await getDocs(collection(db,"products"))

products=[]

let html=""

snapshot.forEach(docSnap=>{

let p=docSnap.data()
p.id=docSnap.id

products.push(p)

let status=p.stock?"במלאי":"לא במלאי"
let className=p.stock?"instock":"outstock"

html+=`

<div class="product" ${adminMode ? `onclick="openProduct('${p.id}')"` : ""}>

<img src="${p.image}">

<div class="name">${p.name}</div>

<div class="price">₪${p.price}</div>

<div class="status ${className}">${status}</div>

</div>

`

})

document.getElementById("gallery").innerHTML=html

}

loadProducts()


window.adminLogin=function(){

let pass=prompt("סיסמת מנהל")

if(pass==="1234"){

adminMode=true

alert("מצב מנהל הופעל")

document.getElementById("addBtn").style.display="block"

loadProducts()

}

}


window.openProduct=function(id){

let p=products.find(x=>x.id===id)

modal.style.display="flex"
document.body.classList.add("modal-open")

modalImg.src=p.image

modalStock.innerText=p.stock?"במלאי":"לא במלאי"

modalName.innerHTML=`<input id="editName" value="${p.name}">`

modalDesc.innerHTML=`<textarea id="editDesc">${p.description}</textarea>`

modalPrice.innerHTML=`<input id="editPrice" type="number" value="${p.price}">`

adminArea.innerHTML=`

<button onclick="saveChanges('${id}')">שמור</button>

<button onclick="toggleStock('${id}')">שנה מלאי</button>

<button onclick="changeImage('${id}')">שנה תמונה</button>

<button onclick="deleteProduct('${id}')">מחק מוצר</button>

`

}


window.saveChanges=async function(id){

let newName=document.getElementById("editName").value
let newDesc=document.getElementById("editDesc").value
let newPrice=document.getElementById("editPrice").value

await updateDoc(doc(db,"products",id),{

name:newName,
description:newDesc,
price:Number(newPrice)

})

alert("נשמר")

loadProducts()

}


window.toggleStock=async function(id){

let product=products.find(p=>p.id===id)

await updateDoc(doc(db,"products",id),{

stock:!product.stock

})

loadProducts()

}


window.changeImage=function(id){

let input=document.createElement("input")

input.type="file"
input.accept="image/*"

input.onchange=function(){

let file=input.files[0]

let reader=new FileReader()

reader.onload=function(){

updateDoc(doc(db,"products",id),{
image:reader.result
}).then(()=>{

alert("התמונה עודכנה")

loadProducts()

})

}

reader.readAsDataURL(file)

}

input.click()

}


window.deleteProduct=function(id){

if(!confirm("למחוק מוצר?")) return

deleteDoc(doc(db,"products",id)).then(()=>{

alert("המוצר נמחק")

closeModal()

loadProducts()

})

}


window.showAddForm=function(){

document.getElementById("addForm").style.display="block"

}


window.saveNewProduct=function(){

let name=document.getElementById("newName").value
let price=document.getElementById("newPrice").value
let desc=document.getElementById("newDesc").value

let file=document.getElementById("newImage").files[0]

let reader=new FileReader()

reader.onload=function(){

addDoc(collection(db,"products"),{

name:name,
description:desc,
price:Number(price),
image:reader.result,
stock:true

}).then(()=>{

alert("המוצר נוסף")

loadProducts()

document.getElementById("addForm").style.display="none"

})

}

reader.readAsDataURL(file)

}

</script>

</body>

</html>
